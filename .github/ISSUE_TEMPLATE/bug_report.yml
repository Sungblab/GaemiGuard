name: 버그 리포트
description: 재현 가능한 버그를 제보합니다.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        민감 정보는 제거해 주세요. 계좌번호, 토큰, 주문번호, 실제 인증 로그는 공개 이슈에 올리면 안 됩니다.
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 가능한 한 짧은 단계로 적어 주세요.
      placeholder: |
        1. pnpm dev 실행
        2. Commander 패널에서 ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 환경
      placeholder: Windows 11, Node 22, pnpm 10
  - type: textarea
    id: logs
    attributes:
      label: 관련 로그
      description: 민감 정보를 제거한 로그만 붙여 주세요.
      render: shell
