<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GaemiGuard Design Survey</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f9fafb;
      --surface-strong: #f2f4f6;
      --line: #e5e8eb;
      --line-soft: #eef1f4;
      --text: #191f28;
      --muted: #4e5968;
      --weak: #8b95a1;
      --blue: #3182f6;
      --blue-weak: #e8f3ff;
      --blue-text: #1b64da;
      --red: #f04452;
      --red-weak: #fff0f1;
      --green: #00a86b;
      --green-weak: #eafaf3;
      --yellow: #ff8a00;
      --yellow-weak: #fff6e5;
      --radius: 8px;
      --shadow: 0 10px 24px rgba(25, 31, 40, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1120px;
      background: var(--bg);
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      height: 58px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 430px;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 18px;
      font-weight: 850;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #191f28;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
    }

    .title-zone {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 2px;
      color: var(--weak);
      font-size: 12px;
      font-weight: 750;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 850;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding-right: 18px;
    }

    .btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface);
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.soft {
      border-color: #d6e8ff;
      background: var(--blue-weak);
      color: var(--blue-text);
    }

    .btn.danger {
      border-color: #ffd4d8;
      background: var(--red-weak);
      color: var(--red);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(620px, 1fr) 430px;
      min-height: calc(100vh - 58px);
    }

    .nav {
      border-right: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 58px;
      height: calc(100vh - 58px);
      overflow: auto;
      padding: 14px 12px 18px;
    }

    .progress-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      background: var(--surface);
      margin-bottom: 12px;
    }

    .progress-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }

    .progress-label {
      color: var(--weak);
      font-size: 12px;
      font-weight: 750;
    }

    .progress-value {
      color: var(--text);
      font-size: 16px;
      font-weight: 850;
    }

    .bar {
      height: 7px;
      border-radius: 999px;
      background: #e8edf3;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--blue);
      transition: width 180ms ease;
    }

    .section-link {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      min-height: 48px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      padding: 8px 10px;
      text-align: left;
    }

    .section-link:hover,
    .section-link.active {
      background: var(--surface-strong);
      color: var(--text);
    }

    .section-index {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--weak);
      font-size: 11px;
      font-weight: 850;
      border: 1px solid var(--line);
    }

    .section-link.active .section-index {
      border-color: #cfe5ff;
      background: var(--blue-weak);
      color: var(--blue-text);
    }

    .section-name {
      min-width: 0;
      font-size: 13px;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-count {
      color: var(--weak);
      font-size: 11px;
      font-weight: 750;
    }

    main {
      min-width: 0;
      padding: 26px 28px 40px;
      background: #fff;
    }

    .section-head {
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
    }

    .section-kicker {
      margin: 0 0 8px;
      color: var(--blue-text);
      font-size: 13px;
      font-weight: 800;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.22;
      font-weight: 850;
    }

    .section-desc {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 760px;
    }

    .jump-actions {
      display: flex;
      gap: 8px;
    }

    .question {
      border-bottom: 1px solid var(--line-soft);
      padding: 20px 0;
    }

    .question:first-of-type {
      padding-top: 6px;
    }

    .q-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      margin-bottom: 12px;
    }

    .q-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 800;
    }

    .q-help {
      margin: 5px 0 0;
      color: var(--weak);
      font-size: 13px;
      line-height: 1.48;
    }

    .required {
      color: var(--blue-text);
      background: var(--blue-weak);
      border: 1px solid #d6e8ff;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 850;
      align-self: start;
      white-space: nowrap;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .options.grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .option {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      min-height: 52px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      text-align: left;
    }

    .option:hover {
      background: var(--surface);
    }

    .option.selected {
      border-color: #b8dcff;
      background: var(--blue-weak);
      color: var(--blue-text);
    }

    .option-main {
      min-width: 0;
    }

    .option-label {
      font-size: 14px;
      font-weight: 790;
      color: inherit;
    }

    .option-desc {
      margin-top: 3px;
      color: var(--weak);
      font-size: 12px;
      line-height: 1.35;
    }

    .option.selected .option-desc {
      color: #456f9f;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--weak);
      padding: 0 8px;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .option.selected .pill {
      background: #fff;
      color: var(--blue-text);
    }

    .input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
      padding: 11px 12px;
      font-size: 14px;
      line-height: 1.45;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    .question-note {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px;
    }

    .question-note-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      color: var(--weak);
      font-size: 12px;
      font-weight: 850;
    }

    .question-note textarea {
      min-height: 72px;
      background: #fff;
      font-size: 13px;
    }

    .input:focus,
    textarea:focus,
    select:focus {
      border-color: #9dccff;
      box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.12);
    }

    .range-row {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr) 130px;
      gap: 12px;
      align-items: center;
    }

    .range-label {
      color: var(--weak);
      font-size: 12px;
      font-weight: 750;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .range-value {
      text-align: right;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
    }

    .summary {
      border-left: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 58px;
      height: calc(100vh - 58px);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .summary-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .summary-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .summary-title {
      margin: 0;
      font-size: 17px;
      font-weight: 850;
    }

    .save-state {
      height: 25px;
      border-radius: 999px;
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      background: var(--green-weak);
      color: #008a5a;
      font-size: 11px;
      font-weight: 850;
    }

    .summary-body {
      overflow: auto;
      padding: 14px 18px 18px;
    }

    .summary-block {
      padding: 14px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .summary-block:first-child {
      padding-top: 0;
    }

    .summary-block h3 {
      margin: 0 0 9px;
      color: var(--weak);
      font-size: 12px;
      font-weight: 850;
    }

    .decision-list {
      display: grid;
      gap: 8px;
    }

    .decision {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: 13px;
      line-height: 1.42;
    }

    .decision-key {
      color: var(--weak);
      font-weight: 750;
    }

    .decision-value {
      color: var(--text);
      font-weight: 720;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .missing-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .missing-list li {
      border: 1px solid #ffe0ad;
      background: var(--yellow-weak);
      color: #9a5600;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.42;
    }

    .empty {
      color: var(--weak);
      font-size: 13px;
      line-height: 1.5;
    }

    .export-preview {
      width: 100%;
      min-height: 210px;
      max-height: 330px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      padding: 11px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow: auto;
    }

    .footer-actions {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      body {
        min-width: 0;
      }

      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .brand,
      .toolbar {
        padding: 8px 14px;
      }

      .topbar {
        height: auto;
        align-items: start;
      }

      .title-zone {
        padding: 0 14px 8px;
      }

      .nav,
      .summary {
        position: static;
        height: auto;
        border-right: 0;
        border-left: 0;
      }

      .nav {
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .progress-card {
        grid-column: 1 / -1;
      }

      main {
        padding: 20px 16px;
      }

      .section-head,
      .q-top,
      .range-row {
        grid-template-columns: 1fr;
      }

      .options.grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">G</div>
      <div>GaemiGuard</div>
    </div>
    <div class="title-zone">
      <p class="eyebrow">설계 확정 설문표</p>
      <h1>투자 에이전트 오케스트레이터의 제품, 자동화, 아키텍처를 한 번에 잠그기</h1>
    </div>
    <div class="toolbar">
      <button class="btn soft" id="fillRecommended">추천값 채우기</button>
      <button class="btn" id="importBtn">가져오기</button>
      <button class="btn" id="downloadJson">JSON 저장</button>
      <button class="btn primary" id="downloadMd">설계안 저장</button>
      <input class="hidden" type="file" id="importFile" accept="application/json" />
    </div>
  </header>

  <div class="layout">
    <aside class="nav" id="sectionNav">
      <div class="progress-card">
        <div class="progress-row">
          <div class="progress-label">전체 답변률</div>
          <div class="progress-value" id="progressText">0%</div>
        </div>
        <div class="bar"><span id="progressBar"></span></div>
      </div>
    </aside>

    <main>
      <div class="section-head">
        <div>
          <p class="section-kicker" id="sectionKicker">Section</p>
          <h2 id="sectionTitle">Loading</h2>
          <p class="section-desc" id="sectionDesc"></p>
        </div>
        <div class="jump-actions">
          <button class="btn" id="prevSection">이전</button>
          <button class="btn primary" id="nextSection">다음</button>
        </div>
      </div>
      <div id="questions"></div>
    </main>

    <aside class="summary">
      <div class="summary-head">
        <div class="summary-title-row">
          <h2 class="summary-title">현재 결정 요약</h2>
          <span class="save-state" id="saveState">자동 저장됨</span>
        </div>
      </div>
      <div class="summary-body">
        <div class="summary-block">
          <h3>핵심 잠금값</h3>
          <div class="decision-list" id="decisionList"></div>
        </div>
        <div class="summary-block">
          <h3>아직 비어있는 필수 결정</h3>
          <ul class="missing-list" id="missingList"></ul>
        </div>
        <div class="summary-block">
          <h3>에이전트에게 넘길 설계 프롬프트</h3>
          <div class="export-preview" id="promptPreview"></div>
        </div>
      </div>
      <div class="footer-actions">
        <button class="btn soft" id="copyPrompt">프롬프트 복사</button>
        <button class="btn danger" id="resetAll">초기화</button>
      </div>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = "gaemiguard.designSurvey.v1";

    const survey = [
      {
        id: "positioning",
        title: "제품 정체성",
        desc: "GaemiGuard가 무엇이고 무엇이 아닌지 먼저 잠급니다. 이 섹션이 흔들리면 뒤의 브로커 연결, 매매 권한, 에이전트, UI가 전부 흔들립니다.",
        questions: [
          {
            id: "product_promise",
            type: "choice",
            required: true,
            label: "한 문장 제품 약속은 무엇인가?",
            help: "사용자가 이 앱을 왜 켜는지 정하는 최상위 문장입니다.",
            options: [
              ["think_before_trade", "거래 전 한 번 더 생각하게 하는 투자 가드", "거래는 증권사에서, 판단 정리는 GaemiGuard에서"],
              ["agent_terminal", "내 계좌, 수동 포트폴리오, 리서치를 연결한 투자 에이전트", "대화형 분석, 근거 정리, 도구 실행을 전면에 둠"],
              ["auto_strategy", "개인 투자 원칙 기반 자동매매 오케스트레이터", "장기 방향에는 가능하지만 초기에는 안전 설계 부담이 큼"],
              ["journal_memory", "투자 논리와 매매 복기를 자동으로 남기는 메모리 앱", "기록/복기 중심으로 1단계가 작아짐"]
            ],
            recommended: "agent_terminal"
          },
          {
            id: "not_product",
            type: "multi",
            required: true,
            label: "명시적으로 하지 않을 것은?",
            help: "제품 범위가 커지는 것을 막기 위한 배제 항목입니다.",
            options: [
              ["profit_bot", "수익 보장 AI 자동매매봇"],
              ["toss_clone", "토스증권/증권사 화면 대체 앱"],
              ["bloomberg_clone", "블룸버그/OpenBB 클론"],
              ["community_crawler", "커뮤니티 크롤러가 본체인 앱"],
              ["mobile_brokerage", "증권사 앱"],
              ["hf_quant", "초단타/전문 퀀트 터미널"]
            ],
            recommended: ["profit_bot", "toss_clone", "bloomberg_clone", "hf_quant"]
          },
          {
            id: "target_user",
            type: "multi",
            required: true,
            label: "초기 타깃 사용자는 누구인가?",
            help: "기능 밀도, 문구, 권한 모델, 배포 방식이 이 답에 따라 달라집니다.",
            options: [
              ["korean_retail", "한국 개인 투자자"],
              ["brokerage_users", "토스/한국투자/키움 같은 증권사 앱 사용자"],
              ["ai_power_user", "ChatGPT/Codex/Cursor를 이미 쓰는 AI 파워 유저"],
              ["developer_investor", "개발자/학생/인디 해커 투자자"],
              ["journal_failer", "노션/엑셀 투자일지를 꾸준히 못 쓰는 사람"],
              ["beginner", "투자 초보자"]
            ],
            recommended: ["korean_retail", "brokerage_users", "ai_power_user", "developer_investor"]
          },
          {
            id: "1단계_value",
            type: "choice",
            required: true,
            label: "1단계에서 가장 먼저 증명할 가치는?",
            help: "첫 구현 범위를 자르는 기준입니다.",
            options: [
              ["order_guard", "내 원칙을 어기는 주문을 잡아낸다", "계좌/룰/주문 검토 중심"],

    const labels = new Map();
    const questionById = new Map();
    const recommended = {};

    survey.forEach((section) => {
      section.questions.forEach((question) => {
        questionById.set(question.id, question);
        if (question.recommended !== undefined) {
          recommended[question.id] = question.recommended;
        }
        if (question.options) {
          question.options.forEach((option) => labels.set(`${question.id}:${option[0]}`, option[1]));
        }
      });
    });

    const state = {
      activeSection: 0,
      answers: {},
      notes: {},
      updatedAt: null
    };

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.activeSection = Number.isInteger(parsed.activeSection) ? parsed.activeSection : 0;
        state.answers = parsed.answers && typeof parsed.answers === "object" ? parsed.answers : {};
        state.notes = parsed.notes && typeof parsed.notes === "object" ? parsed.notes : {};
        state.updatedAt = parsed.updatedAt || null;
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      state.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const saveStateEl = document.getElementById("saveState");
      saveStateEl.textContent = "자동 저장됨";
      setTimeout(() => {
        saveStateEl.textContent = "저장 완료";
      }, 350);
    }

    function isAnswered(question) {
      const value = state.answers[question.id];
      if (question.type === "multi") return Array.isArray(value) && value.length > 0;
      if (question.type === "range") return value !== undefined && value !== null && value !== "";
      return typeof value === "string" && value.trim().length > 0;
    }

    function getLabel(question, value) {
      if (question.type === "multi") {
        if (!Array.isArray(value) || value.length === 0) return "";
        return value.map((item) => labels.get(`${question.id}:${item}`) || item).join(", ");
      }
      if (question.options) return labels.get(`${question.id}:${value}`) || value || "";
      return value === undefined || value === null ? "" : String(value);
    }

    function allQuestions() {
      return survey.flatMap((section) => section.questions);
    }

    function requiredQuestions() {
      return allQuestions().filter((question) => question.required);
    }

    function setAnswer(id, value) {
      state.answers[id] = value;
      saveState();
      render();
    }

    function toggleMulti(id, value) {
      const current = Array.isArray(state.answers[id]) ? [...state.answers[id]] : [];
      const index = current.indexOf(value);
      if (index >= 0) current.splice(index, 1);
      else current.push(value);
      setAnswer(id, current);
    }

    function renderNav() {
      const nav = document.getElementById("sectionNav");
      const progressCard = nav.querySelector(".progress-card");
      nav.innerHTML = "";
      nav.appendChild(progressCard);
      survey.forEach((section, index) => {
        const answered = section.questions.filter(isAnswered).length;
        const button = document.createElement("button");
        button.className = `section-link ${index === state.activeSection ? "active" : ""}`;
        button.innerHTML = `
          <span class="section-index">${index + 1}</span>
          <span class="section-name">${section.title}</span>
          <span class="section-count">${answered}/${section.questions.length}</span>
        `;
        button.addEventListener("click", () => {
          state.activeSection = index;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        nav.appendChild(button);
      });
    }

    function renderQuestion(question) {
      const wrapper = document.createElement("section");
      wrapper.className = "question";
      const required = question.required ? '<span class="required">필수</span>' : "";
      wrapper.innerHTML = `
        <div class="q-top">
          <div>
            <h3 class="q-title">${question.label}</h3>
            <p class="q-help">${question.help || ""}</p>
          </div>
          ${required}
        </div>
      `;

      const value = state.answers[question.id];
      if (question.type === "choice" || question.type === "multi") {
        const options = document.createElement("div");
        options.className = `options ${question.options.length > 3 ? "grid" : ""}`;
        question.options.forEach((option) => {
          const selected = question.type === "multi"
            ? Array.isArray(value) && value.includes(option[0])
            : value === option[0];
          const button = document.createElement("button");
          button.type = "button";
          button.className = `option ${selected ? "selected" : ""}`;
          const rec = question.recommended === option[0] || (Array.isArray(question.recommended) && question.recommended.includes(option[0]));
          button.innerHTML = `
            <span class="option-main">
              <span class="option-label">${option[1]}</span>
              ${option[2] ? `<span class="option-desc">${option[2]}</span>` : ""}
            </span>
            ${rec ? '<span class="pill">추천</span>' : ""}
          `;
          button.addEventListener("click", () => {
            if (question.type === "multi") toggleMulti(question.id, option[0]);
            else setAnswer(question.id, option[0]);
          });
          options.appendChild(button);
        });
        wrapper.appendChild(options);
      }

      if (question.type === "textarea") {
        const textarea = document.createElement("textarea");
        textarea.value = value || "";
        textarea.placeholder = question.placeholder || "";
        textarea.addEventListener("input", (event) => {
          state.answers[question.id] = event.target.value;
          saveState();
          renderSummary();
          renderProgress();
        });
        wrapper.appendChild(textarea);
      }

      if (question.type === "text") {
        const input = document.createElement("input");
        input.className = "input";
        input.value = value || "";
        input.placeholder = question.placeholder || "";
        input.addEventListener("input", (event) => {
          state.answers[question.id] = event.target.value;
          saveState();
          renderSummary();
          renderProgress();
        });
        wrapper.appendChild(input);
      }

      if (question.type === "range") {
        const current = value || question.recommended || question.min;
        const row = document.createElement("div");
        row.className = "range-row";
        row.innerHTML = `
          <span class="range-label">${question.left}</span>
          <input type="range" min="${question.min}" max="${question.max}" value="${current}" />
          <span class="range-value">${current} / ${question.max}</span>
        `;
        const input = row.querySelector("input");
        const valueEl = row.querySelector(".range-value");
        input.addEventListener("input", (event) => {
          state.answers[question.id] = event.target.value;
          valueEl.textContent = `${event.target.value} / ${question.max}`;
          saveState();
          renderSummary();
          renderProgress();
        });
        wrapper.appendChild(row);
      }

      const noteBox = document.createElement("div");
      noteBox.className = "question-note";
      noteBox.innerHTML = `
        <div class="question-note-label">
          <span>내 멘트</span>
          <span>선택 이유, 찝찝한 점, 구현 주의사항</span>
        </div>
      `;
      const note = document.createElement("textarea");
      note.value = state.notes[question.id] || "";
      note.placeholder = "이 질문에 대해 네 생각을 자유롭게 남기기...";
      note.addEventListener("input", (event) => {
        state.notes[question.id] = event.target.value;
        saveState();
        renderSummary();
      });
      noteBox.appendChild(note);
      wrapper.appendChild(noteBox);

      return wrapper;
    }

    function renderMain() {
      const section = survey[state.activeSection];
      document.getElementById("sectionKicker").textContent = `Section ${state.activeSection + 1} / ${survey.length}`;
      document.getElementById("sectionTitle").textContent = section.title;
      document.getElementById("sectionDesc").textContent = section.desc;
      document.getElementById("prevSection").disabled = state.activeSection === 0;
      document.getElementById("nextSection").disabled = state.activeSection === survey.length - 1;

      const container = document.getElementById("questions");
      container.innerHTML = "";
      section.questions.forEach((question) => container.appendChild(renderQuestion(question)));
    }

    function renderProgress() {
      const questions = allQuestions();
      const answered = questions.filter(isAnswered).length;
      const percent = Math.round((answered / questions.length) * 100);
      document.getElementById("progressText").textContent = `${percent}%`;
      document.getElementById("progressBar").style.width = `${percent}%`;
    }

    function exportPayload() {
      const answers = {};
      allQuestions().forEach((question) => {
        const value = state.answers[question.id];
        answers[question.id] = {
          label: question.label,
          value,
          display: getLabel(question, value),
          note: state.notes[question.id] || "",
          required: Boolean(question.required)
        };
      });
      return {
        project: "GaemiGuard",
        purpose: "Design decision survey for product, agent workflow, automation, MiroFish integration, architecture, security, UI, 1단계, and operations.",
        version: 1,
        generatedAt: new Date().toISOString(),
        completion: completionStats(),
        answers
      };
    }

    function completionStats() {
      const questions = allQuestions();
      const required = requiredQuestions();
      const answered = questions.filter(isAnswered).length;
      const requiredAnswered = required.filter(isAnswered).length;
      return {
        answered,
        total: questions.length,
        percent: Math.round((answered / questions.length) * 100),
        requiredAnswered,
        requiredTotal: required.length,
        requiredPercent: Math.round((requiredAnswered / required.length) * 100)
      };
    }

    function markdownSpec() {
      const stats = completionStats();
      const lines = [
        "# GaemiGuard Design Survey Result",
        "",
        `Generated at: ${new Date().toISOString()}`,
        `Completion: ${stats.answered}/${stats.total} (${stats.percent}%)`,
        `Required decisions: ${stats.requiredAnswered}/${stats.requiredTotal} (${stats.requiredPercent}%)`,
        "",
        "## Locked Direction",
        "",
        ...summaryDecisionRows().map(([key, value]) => `- ${key}: ${value || "미정"}`),
        ""
      ];

      survey.forEach((section) => {
        lines.push(`## ${section.title}`, "");
        section.questions.forEach((question) => {
          lines.push(`### ${question.label}`);
          lines.push(getLabel(question, state.answers[question.id]) || "미응답");
          const note = (state.notes[question.id] || "").trim();
          if (note) {
            lines.push("");
            lines.push("내 멘트:");
            lines.push(note);
          }
          lines.push("");
        });
      });

      lines.push("## Implementation Prompt", "");
      lines.push(agentPrompt());
      lines.push("");
      return lines.join("\n");
    }

    function summaryDecisionRows() {
      const keys = [
        ["제품 약속", "product_promise"],
        ["1단계 가치", "1단계_value"],
        ["첫 화면", "first_screen"],
        ["오른쪽 패널", "right_panel"],
        ["브로커 API", "broker_api_scope"],
        ["Codex 사용", "codex_usage"],
        ["MiroFish 역할", "mirofish_role"],
        ["자동화 수준", "automation_level"],
        ["주문 권한", "allowed_order_actions"],
        ["저장소", "storage_core"],
        ["데스크톱 shell", "desktop_shell"],
        ["실행 방식", "startup_expectation"]
      ];
      return keys.map(([label, id]) => {
        const question = questionById.get(id);
        return [label, question ? getLabel(question, state.answers[id]) : ""];
      });
    }

    function missingRequired() {
      return requiredQuestions().filter((question) => !isAnswered(question));
    }

    function agentPrompt() {
      const stats = completionStats();
      const locked = summaryDecisionRows().map(([key, value]) => `${key}: ${value || "미정"}`).join("\n");
      const missing = missingRequired().slice(0, 12).map((question) => `- ${question.label}`).join("\n") || "없음";
      return [
        "GaemiGuard 설계를 이어서 확정/구현해줘.",
        "",
        "현재 제품 방향:",
        locked,
        "",
        `답변 진행률: ${stats.answered}/${stats.total}, 필수 결정: ${stats.requiredAnswered}/${stats.requiredTotal}`,
        "",
        "아직 비어있는 필수 결정:",
        missing,
        "",
        "중요한 설계 원칙:",
        "- GaemiGuard의 본체는 개인 투자 에이전트이고, 증권사 연결은 브로커 어댑터다.",
        "- Toss는 첫 구현 어댑터이고, KIS/키움/LS/수동 입력/CSV는 같은 브로커 계약 아래에서 나중에 붙인다.",
        "- 브로커 연동은 공식 API만 사용하고 비공식 웹/내부 API는 쓰지 않는다.",
        "- 증권 연결이 없어도 watchlist, 수동 포트폴리오, thesis/rules, research/scenario artifact로 쓸 수 있어야 한다.",
        "- MiroFish는 Docker 필수가 아니라 Windows-native CLI sidecar로 사용.",
        "- MiroFish 결과는 직접 주문 트리거가 아니라 scenario/advisory signal로 취급.",
        "- 수동 실주문과 룰 기반 자동매매는 장기 방향에 포함되지만 Order Guard, audit log, kill switch, idempotency, explicit approval 전에는 금지.",
        "- 제품은 local-first personal investment agent이지 수익 보장 봇, 증권사 화면 클론, 뉴스 터미널 클론이 아님."
      ].join("\n");
    }

    function renderSummary() {
      const list = document.getElementById("decisionList");
      list.innerHTML = "";
      summaryDecisionRows().forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "decision";
        row.innerHTML = `<span class="decision-key">${key}</span><span class="decision-value">${value || "미정"}</span>`;
        list.appendChild(row);
      });

      const missing = document.getElementById("missingList");
      missing.innerHTML = "";
      const items = missingRequired().slice(0, 8);
      if (items.length === 0) {
        const li = document.createElement("li");
        li.textContent = "필수 결정은 모두 채웠습니다.";
        missing.appendChild(li);
      } else {
        items.forEach((question) => {
          const li = document.createElement("li");
          li.textContent = question.label;
          li.addEventListener("click", () => {
            const sectionIndex = survey.findIndex((section) => section.questions.some((item) => item.id === question.id));
            if (sectionIndex >= 0) {
              state.activeSection = sectionIndex;
              saveState();
              render();
              window.scrollTo({ top: 0, behavior: "smooth" });
            }
          });
          missing.appendChild(li);
        });
      }

      document.getElementById("promptPreview").textContent = agentPrompt();
    }

    function render() {
      state.activeSection = Math.max(0, Math.min(survey.length - 1, state.activeSection));
      renderNav();
      renderMain();
      renderProgress();
      renderSummary();
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("prevSection").addEventListener("click", () => {
      state.activeSection -= 1;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("nextSection").addEventListener("click", () => {
      state.activeSection += 1;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("fillRecommended").addEventListener("click", () => {
      Object.keys(recommended).forEach((key) => {
        state.answers[key] = Array.isArray(recommended[key]) ? [...recommended[key]] : recommended[key];
      });
      saveState();
      render();
    });

    document.getElementById("downloadJson").addEventListener("click", () => {
      download("gaemiguard-design-survey.json", JSON.stringify(exportPayload(), null, 2), "application/json");
    });

    document.getElementById("downloadMd").addEventListener("click", () => {
      download("gaemiguard-design-spec.md", markdownSpec(), "text/markdown");
    });

    document.getElementById("copyPrompt").addEventListener("click", async () => {
      await navigator.clipboard.writeText(agentPrompt());
      document.getElementById("saveState").textContent = "복사됨";
    });

    document.getElementById("resetAll").addEventListener("click", () => {
      const ok = window.confirm("설문 답변을 전부 초기화할까요?");
      if (!ok) return;
      state.answers = {};
      state.notes = {};
      state.activeSection = 0;
      saveState();
      render();
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const parsed = JSON.parse(text);
      const answers = {};
      if (parsed.answers) {
        Object.entries(parsed.answers).forEach(([id, answer]) => {
          answers[id] = answer && typeof answer === "object" && "value" in answer ? answer.value : answer;
        });
      }
      const notes = {};
      if (parsed.notes) {
        Object.assign(notes, parsed.notes);
      }
      if (parsed.answers) {
        Object.entries(parsed.answers).forEach(([id, answer]) => {
          if (answer && typeof answer === "object" && typeof answer.note === "string") {
            notes[id] = answer.note;
          }
        });
      }
      state.answers = answers;
      state.notes = notes;
      state.activeSection = 0;
      saveState();
      render();
      event.target.value = "";
    });

    loadState();
    render();
  </script>
</body>
</html>
